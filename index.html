<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WFO Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center px-4">
  <div class="bg-white w-full max-w-sm p-6 rounded-2xl shadow-xl relative">
    <!-- Overview Icon -->
    <button id="overviewBtn"
      class="absolute top-4 right-4 text-gray-500 hover:text-indigo-600 text-xl">
      📊
    </button>
    <h2 class="text-xl font-bold text-center mb-6">
      WFO 60% Calculator
    </h2>

    <!-- Month & Year Selector -->
    <div class="mb-4 flex gap-3">
      <div class="flex-1">
        <label class="block mb-2 text-sm">Month</label>
        <select id="monthSelect"
          class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400 bg-white">
          <option value="0">January</option>
          <option value="1">February</option>
          <option value="2">March</option>
          <option value="3">April</option>
          <option value="4">May</option>
          <option value="5">June</option>
          <option value="6">July</option>
          <option value="7">August</option>
          <option value="8">September</option>
          <option value="9">October</option>
          <option value="10">November</option>
          <option value="11">December</option>
        </select>
      </div>
      <div class="flex-1">
        <label class="block mb-2 text-sm">Year</label>
        <select id="yearSelect"
          class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400 bg-white">
        </select>
      </div>
    </div>

    <!-- Working Days -->
    <div class="mb-4">
      <label class="block mb-2 text-sm">Total Working Days</label>
      <input id="working" type="number"
        class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400 bg-gray-50" readonly>
    </div>
    <!-- Leave Days -->
    <div class="mb-4">
      <label class="block mb-2 text-sm">Leave Days</label>
      <input id="leave" type="number"
        class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400">
    </div>
    <!-- Live Result -->
    <div id="resultBox"
      class="hidden mt-4 p-4 bg-indigo-100 rounded-xl text-center">
      <p class="text-sm">Required WFO Days (60%)</p>
      <p id="result"
        class="text-3xl font-bold text-indigo-700"></p>
    </div>
  </div>
  <!-- Modal -->
  <div id="modal"
    class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center px-4">
    <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-2xl max-h-[80vh] overflow-y-auto">
      <h3 class="text-lg font-bold mb-4 text-center">
        Monthly Leave Overview
      </h3>
      <div id="overviewContent"
        class="text-sm text-gray-700 space-y-2"></div>
      <button id="closeModal"
        class="mt-6 w-full bg-red-500 text-white py-2 rounded-lg">
        Close
      </button>
    </div>
  </div>
<script>
  const workingInput = document.getElementById("working");
  const leaveInput = document.getElementById("leave");
  const resultBox = document.getElementById("resultBox");
  const result = document.getElementById("result");
  const modal = document.getElementById("modal");
  const overviewBtn = document.getElementById("overviewBtn");
  const overviewContent = document.getElementById("overviewContent");
  const closeModal = document.getElementById("closeModal");
  const monthSelect = document.getElementById("monthSelect");
  const yearSelect = document.getElementById("yearSelect");

  // Populate year dropdown (current year ± 3)
  const today = new Date();
  const currentYear = today.getFullYear();
  const currentMonth = today.getMonth();
  for (let y = currentYear - 3; y <= currentYear + 3; y++) {
    const opt = document.createElement("option");
    opt.value = y;
    opt.textContent = y;
    if (y === currentYear) opt.selected = true;
    yearSelect.appendChild(opt);
  }

  // Set current month as default
  monthSelect.value = currentMonth;

  // Count Mon–Fri days in a given month/year
  function countWeekdays(year, month) {
    const date = new Date(year, month, 1);
    let count = 0;
    while (date.getMonth() === month) {
      const day = date.getDay();
      if (day !== 0 && day !== 6) count++;
      date.setDate(date.getDate() + 1);
    }
    return count;
  }

  function updateWorkingDays() {
    const month = parseInt(monthSelect.value);
    const year = parseInt(yearSelect.value);
    workingInput.value = countWeekdays(year, month);
    calculateLive();
  }

  function calculateLive() {
    let total = parseInt(workingInput.value);
    let leave = parseInt(leaveInput.value) || 0;
    if (!total || leave > total) {
      resultBox.classList.add("hidden");
      return;
    }
    let required = Math.floor((total - leave) * 0.6);
    result.textContent = required + " Days";
    resultBox.classList.remove("hidden");
  }

  // Auto-populate on load
  updateWorkingDays();

  monthSelect.addEventListener("change", updateWorkingDays);
  yearSelect.addEventListener("change", updateWorkingDays);
  leaveInput.addEventListener("input", calculateLive);

  overviewBtn.addEventListener("click", function () {
    let total = parseInt(workingInput.value);
    if (!total) {
      alert("Enter total working days first.");
      return;
    }
    let html = "";
    for (let l = 0; l <= total; l++) {
      let required = Math.floor((total - l) * 0.6);
      html += `
        <div class="flex justify-between border-b py-2">
          <span>Leave ${l}</span>
          <span class="font-semibold text-indigo-600">
            ${required} days WFO
          </span>
        </div>
      `;
    }
    overviewContent.innerHTML = html;
    modal.classList.remove("hidden");
    modal.classList.add("flex");
  });
  closeModal.addEventListener("click", function () {
    modal.classList.add("hidden");
    modal.classList.remove("flex");
  });
  modal.addEventListener("click", function (e) {
    if (e.target === modal) {
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    }
  });
</script>
</body>
</html>
